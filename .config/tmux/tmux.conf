# Prefix
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Reload config
bind q source-file ~/.config/tmux/tmux.conf

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# Pane Controls
bind h split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"
bind K kill-pane

bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

bind -n C-S-Left resize-pane -L 5
bind -n C-S-Down resize-pane -D 5
bind -n C-S-Up resize-pane -U 5
bind -n C-S-Right resize-pane -R 5

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind x kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session
bind X kill-session

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off
set -g visual-bell off
set -g bell-action none

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""

# Theme — gruvbox-material-soft
set -g status-style "bg=default,fg=#d4be98"
set -g status-left "#[fg=#d8a657,bg=#504945,bold] #S #[bg=default] "
set -g status-right "#[fg=#d8a657]#{?client_prefix,PREFIX ,}#[fg=#7c6f64]#h "
set -g window-status-format "#[fg=#7c6f64] #I:#W "
set -g window-status-current-format "#[fg=#d8a657,bold] #I:#W "
set -g pane-border-style "fg=#7c6f64"
set -g pane-active-border-style "fg=#d8a657"
set -g message-style "bg=default,fg=#d8a657"
set -g message-command-style "bg=default,fg=#d8a657"
set -g mode-style "bg=#d8a657,fg=#32302f"
setw -g clock-mode-colour "#d8a657"
